# ============================================================
# Urbie — Configuração Apache para EC2
# Arquivo: /etc/apache2/sites-available/urbie.conf
# ============================================================
#
# Estrutura de acesso:
#   http://15.228.98.234/urbie        → Site / Landing page
#   http://15.228.98.234/urbie/painel → Painel Administrativo (em breve)
#
# Pré-requisitos no servidor:
#   sudo a2enmod rewrite
#   sudo a2enmod headers
#   sudo a2enmod expires
#   sudo service apache2 restart
# ============================================================

<VirtualHost *:80>
    ServerAdmin webmaster@urbie.com.br
    DocumentRoot /var/www/html

    # --------------------------------------------------------
    # Site Urbie — /urbie (aponta para Laravel public/)
    # --------------------------------------------------------
    Alias /urbie /var/www/urbie/site/public

    <Directory /var/www/urbie/site/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Força o Laravel a usar o subfolder correto
        SetEnv APP_URL http://15.228.98.234/urbie
        SetEnv ASSET_URL http://15.228.98.234/urbie
    </Directory>

    # --------------------------------------------------------
    # Headers de segurança
    # --------------------------------------------------------
    <IfModule mod_headers.c>
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    # --------------------------------------------------------
    # Logs
    # --------------------------------------------------------
    ErrorLog ${APACHE_LOG_DIR}/urbie-error.log
    CustomLog ${APACHE_LOG_DIR}/urbie-access.log combined
</VirtualHost>
